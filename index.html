<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تفعيل أداة المقاول الذكي - Devext</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background-color: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #334155; text-align: right; }
        h2, h3 { text-align: center; color: #f8fafc; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #94a3b8; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; background-color: #0f172a; color: white; box-sizing: border-box; font-size: 15px; font-family: monospace; text-align: center; }
        .btn { color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; margin-top: 10px; box-sizing: border-box; }
        .btn-blue { background-color: #0284c7; }
        .btn-blue:hover { background-color: #0369a1; }
        .btn-green { background-color: #16a34a; }
        .btn-green:hover { background-color: #15803d; }
        .btn-red { background-color: #dc2626; }
        .btn-red:hover { background-color: #b91c1c; }
        .status { margin-top: 15px; font-weight: bold; color: #38bdf8; text-align: center; line-height: 1.6; }
        .info-box { background: #0f172a; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #334155; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>لوحة إشراف تطبيق المقاول الذكي 🛠️</h2>
        <div class="card">
            <h3>🔍 البحث عن جهاز وإدارة حالته</h3>
            <input type="text" id="search-device-id" placeholder="مثال: TSCAM-XXXXXX">
            <button onclick="searchDevice()" class="btn btn-blue">🔍 فحص وبحث عن الجهاز</button>
            
            <div id="search-result-box" class="info-box" style="display: none;">
                <p>📊 <strong>الحالة الحالية:</strong></p>
                <div id="device-details" style="color: #e2e8f0; font-family: monospace; direction: ltr; text-align: center;"></div>
                <hr style="border-color: #334155; margin: 15px 0;">
                <select id="update-plan-status">
                    <option value="monthly">باقة شهرية (Monthly)</option>
                    <option value="yearly">باقة سنوية (Yearly)</option>
                    <option value="trial">فترة تجريبية 48 ساعة جديدة (Trial)</option>
                </select>
                <button onclick="updateDevice()" class="btn btn-green">💾 حفظ التعديل / تفعيل الحساب</button>
                <button onclick="deleteDevice()" class="btn btn-red" style="margin-top: 15px;">🗑️ حذف الجهاز تماماً</button>
            </div>
            <div class="status" id="search-status"></div>
        </div>

        <div class="card">
            <h3>➕ إضافة جهاز جديد يدويّاً</h3>
            <input type="text" id="add-device-id" placeholder="مثال: TSCAM-YYYYYY">
            <select id="add-plan-status">
                <option value="trial">فترة تجريبية (48 ساعة)</option>
                <option value="monthly">باقة شهرية مدفوعة</option>
                <option value="yearly">باقة سنوية مدفوعة</option>
            </select>
            <button onclick="addNewDevice()" class="btn btn-green">➕ تسجيل وإضافة الجهاز الآن</button>
            <div class="status" id="add-status"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lwffkkzdkvafyuwrcbzl.supabase.co";
        // تم تصحيح المفتاح النظيف تماماً وإزالة التكرار
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3ZmZra3pka3ZhZnl1d3JjYnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODQ5NzUsImV4cCI6MjA5OTk2MDk3NX0.hD7SWLaZ1c1tNfSNuKYHceaqCqS1riqTb1BxfM3_2uA";
        
        const getHeaders = () => ({ 
            "apikey": SUPABASE_KEY, 
            "Authorization": `Bearer ${SUPABASE_KEY}`, 
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        });

        async function searchDevice() {
            const deviceId = document.getElementById('search-device-id').value.trim();
            const statusDiv = document.getElementById('search-status');
            const resultBox = document.getElementById('search-result-box');
            const detailsDiv = document.getElementById('device-details');
            if (!deviceId) return;
            statusDiv.innerText = "جاري البحث..."; resultBox.style.display = "none";

            try {
                const r = await fetch(`${SUPABASE_URL}/rest/v1/users?device_id=eq.${deviceId}`, { 
                    method: "GET",
                    mode: "cors",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const d = await r.json();
                if (!d || d.length === 0) { statusDiv.innerHTML = `❌ الجهاز غير موجود في السحابة.`; } 
                else {
                    statusDiv.innerText = ""; const u = d[0];
                    detailsDiv.innerHTML = `ID: ${u.device_id}<br>Subscribed: ${u.is_subscribed}<br>Trial Expiry: ${u.trial_expires_at ? new Date(u.trial_expires_at).toLocaleString() : 'N/A'}<br>Sub Expiry: ${u.subscription_expires_at ? new Date(u.subscription_expires_at).toLocaleString() : 'N/A'}`;
                    resultBox.style.display = "block";
                }
            } catch (e) { statusDiv.innerText = "❌ خطأ في الاتصال بالسحابة."; }
        }

        async function updateDevice() {
            const deviceId = document.getElementById('search-device-id').value.trim();
            const plan = document.getElementById('update-plan-status').value;
            const statusDiv = document.getElementById('search-status');
            statusDiv.innerText = "جاري التحديث...";
            let isSub = plan !== 'trial', subExpiry = null, trialExpiry = null, now = new Date();
            if (plan === 'monthly') { now.setMonth(now.getMonth() + 1); subExpiry = now.toISOString(); }
            if (plan === 'yearly') { now.setFullYear(now.getFullYear() + 1); subExpiry = now.toISOString(); }
            if (plan === 'trial') { now.setHours(now.getHours() + 48); trialExpiry = now.toISOString(); }

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/users?device_id=eq.${deviceId}`, { 
                    method: "PATCH", 
                    mode: "cors",
                    headers: getHeaders(), 
                    body: JSON.stringify({ is_subscribed: isSub, subscription_expires_at: subExpiry, trial_expires_at: trialExpiry }) 
                });
                statusDiv.innerHTML = `✅ تم التفعيل بنجاح!`; searchDevice();
            } catch (e) { statusDiv.innerText = "❌ فشل التحديث."; }
        }

        async function deleteDevice() {
            const deviceId = document.getElementById('search-device-id').value.trim();
            if(!confirm("حذف نهائي؟")) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/users?device_id=eq.${deviceId}`, { 
                    method: "DELETE", 
                    mode: "cors",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } 
                });
                document.getElementById('search-result-box').style.display = "none";
                document.getElementById('search-status').innerText = "🗑️ تم الحذف بنجاح.";
            } catch (e) { document.getElementById('search-status').innerText = "❌ فشل الحذف."; }
        }

        async function addNewDevice() {
            const deviceId = document.getElementById('add-device-id').value.trim();
            const plan = document.getElementById('add-plan-status').value;
            const statusDiv = document.getElementById('add-status');
            if (!deviceId) return;
            statusDiv.innerText = "جاري الإضافة...";
            let isSub = plan !== 'trial', subExpiry = null, trialExpiry = null, now = new Date();
            if (plan === 'monthly') { now.setMonth(now.getMonth() + 1); subExpiry = now.toISOString(); }
            if (plan === 'yearly') { now.setFullYear(now.getFullYear() + 1); subExpiry = now.toISOString(); }
            if (plan === 'trial') { now.setHours(now.getHours() + 48); trialExpiry = now.toISOString(); }

            try {
                const cr = await fetch(`${SUPABASE_URL}/rest/v1/users?device_id=eq.${deviceId}`, { 
                    method: "GET",
                    mode: "cors",
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } 
                });
                const cd = await cr.json();
                if (cd && cd.length > 0) { statusDiv.innerText = "⚠️ مسجل بالفعل!"; return; }
                await fetch(`${SUPABASE_URL}/rest/v1/users`, { 
                    method: "POST", 
                    mode: "cors",
                    headers: getHeaders(), 
                    body: JSON.stringify({ device_id: deviceId, is_subscribed: isSub, subscription_expires_at: subExpiry, trial_expires_at: trialExpiry }) 
                });
                statusDiv.innerText = "✅ تم إضافة الجهاز بنجاح!";
            } catch (e) { statusDiv.innerText = "❌ فشل الإضافة."; }
        }
    </script>
</body>
</html>
